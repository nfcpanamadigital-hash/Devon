<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Devon Pruett · Polyphony Studios</title>
  <meta name="description" content="Private Piano Instruction, Piano Tuning & Repair, and Music Engineering in Miami, FL.">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0d0d0d;
      --card-bg:    #161616;
      --card-edge:  #1e1e1e;
      --ivory:      #f7f4ee;
      --ivory-dim:  #c8c0b0;
      --gold:       #c8a96e;
      --gold-light: #e0cfa0;
      --gold-dim:   #8a7048;
      --white:      #ffffff;
    }

    html, body {
      min-height: 100%;
      background: var(--black);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      min-height: 100vh;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid rgba(200, 169, 110, 0.18);
      border-radius: 28px;
      padding: 40px 28px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0,0,0,0.7),
        0 4px 16px rgba(200,169,110,0.06);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,169,110,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Profile ── */
    .profile-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .profile-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(145deg, var(--gold), var(--gold-dim));
      box-shadow: 0 0 24px rgba(200,169,110,0.3);
    }

    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: #222;
    }

    /* ── Text ── */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--ivory);
      text-align: center;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .org {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto;
    }

    .services {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--ivory-dim);
      text-align: center;
      line-height: 1.65;
      letter-spacing: 0.01em;
    }

    .rating-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 14px 0 0;
    }

    .stars {
      color: var(--gold);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    .rating-text {
      font-size: 0.72rem;
      color: var(--ivory-dim);
      font-weight: 400;
    }

    /* ── Buttons ── */
    .buttons {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn-label {
      flex: 1;
      text-align: left;
    }

    .btn-primary {
      background: linear-gradient(135deg, #c8a96e 0%, #a8843c 100%);
      color: #0d0d0d;
      box-shadow: 0 4px 16px rgba(200,169,110,0.3);
    }

    .btn-primary:hover {
      filter: brightness(1.08);
      box-shadow: 0 6px 20px rgba(200,169,110,0.4);
      transform: translateY(-1px);
    }

    .btn-dark {
      background: rgba(255,255,255,0.05);
      color: var(--ivory);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-dark:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(200,169,110,0.3);
      transform: translateY(-1px);
    }

    .btn-wa {
      background: rgba(37,211,102,0.1);
      color: #e8f9f0;
      border: 1px solid rgba(37,211,102,0.2);
    }

    .btn-wa:hover {
      background: rgba(37,211,102,0.18);
      transform: translateY(-1px);
    }

    /* ── Button Icons ── */
    .btn-icon-wrap {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-primary .btn-icon-wrap {
      background: rgba(0,0,0,0.15);
    }

    .btn-dark .btn-icon-wrap {
      background: rgba(255,255,255,0.06);
    }

    .btn-wa .btn-icon-wrap {
      background: rgba(37,211,102,0.12);
    }

    .btn-icon-wrap svg {
      width: 17px;
      height: 17px;
    }

    .btn-icon-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      border-radius: 4px;
    }

    /* ── Footer ── */
    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    footer strong {
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .card { padding: 32px 20px 28px; }
      .name { font-size: 1.55rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="profile-wrap">
      <div class="profile-ring">
        <img
          src="assets/devon-profile.png"
          alt="Devon Pruett"
          class="profile-img"
          onerror="this.style.background='#2a2a2a'"
        >

    </div>

    <h1 class="name">Devon Pruett</h1>
    <p class="org">Polyphony Studios</p>

    <div class="divider"></div>

    <p class="services">
      Private Piano Instruction<br>
      Piano Tuning &amp; Repair&nbsp;·&nbsp;Music Engineering<br>
      University of Miami Graduate&nbsp;·&nbsp;Miami, FL
    </p>

    <div class="rating-badge">
      <span class="stars">★★★★★</span>
      <span class="rating-text">Exceptional 5.0 · Thumbtack Verified</span>
    </div>

    <div class="buttons">

      <!-- Save Contact -->
      <a href="Devon_Pruett.vcf" class="btn btn-primary" download="Devon_Pruett.vcf">
        <span class="btn-icon-wrap">

      <!-- Call -->
      <a href="tel:+13057759967" class="btn btn-dark">
        <span class="btn-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6 6l.86-.95a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2.03z"/>
          </svg>

        <span class="btn-label">(305) 775-9967</span>
      </a>

      <!-- WhatsApp -->
      <a href="https://wa.me/13057759967" class="btn btn-wa" target="_blank" rel="noopener noreferrer">
        <span class="btn-icon-wrap">
          <img src="assets/whatsapp_icon.png" alt="" class="btn-icon-img">
        </span>
        <span class="btn-label">WhatsApp</span>
      </a>

      <!-- Website -->
      <a href="https://devon-gamma.vercel.app/Website/" class="btn btn-dark" target="_blank" rel="noopener noreferrer">
        <span class="btn-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
        <span class="btn-label">Visit Website</span>
      </a>

      <!-- Thumbtack -->
      <a href="https://www.thumbtack.com/fl/miami/piano-tuners/devon-piano-lessons-tuning/service/542810856320008202"
         class="btn btn-dark" target="_blank" rel="noopener noreferrer">
        <span class="btn-icon-wrap">
          <!-- Thumbtack T-logo SVG -->
          <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--gold)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6H8v-2h8v2h-3v6z"/>
          </svg>
        </span>
        <span class="btn-label">Thumbtack Profile</span>
      </a>

    </div>
  </div>

  <footer>
    Powered by <strong>Digital Cards Panama</strong>
  </footer>

</body>
</html>
